<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialisation - SOIT</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #2370f5, #1a5cd8);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .reset-container {
        width: 100%;
        max-width: 480px;
      }

      .reset-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reset-card i {
        font-size: 60px;
        color: #2370f5;
        margin-bottom: 20px;
      }

      .reset-card h2 {
        font-size: 24px;
        color: #333;
        margin-bottom: 10px;
      }

      .reset-card p {
        font-size: 14px;
        color: #666;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #333;
      }

      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .input-group input:focus {
        outline: none;
        border-color: #2370f5;
      }

      .btn-reset {
        width: 100%;
        background: linear-gradient(135deg, #2370f5, #1a5cd8);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(35, 112, 245, 0.3);
      }

      .btn-reset:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }

      .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        display: block;
      }

      .message.error {
        background: #ffebee;
        color: #c62828;
        display: block;
      }

      .message.info {
        background: #e3f2fd;
        color: #1565c0;
        display: block;
      }

      .back-link {
        display: block;
        margin-top: 20px;
        color: #2370f5;
        text-decoration: none;
        font-size: 14px;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-card">
        <i class="fas fa-key"></i>
        <h2>Réinitialisation</h2>
        <p>Entrez votre email pour recevoir un lien de réinitialisation</p>

        <div class="input-group">
          <label>📧 Votre adresse email</label>
          <input type="email" id="userEmail" placeholder="exemple@email.com" />
        </div>

        <button class="btn-reset" id="sendResetBtn">
          <i class="fas fa-paper-plane"></i> Envoyer le lien
        </button>

        <div id="message" class="message"></div>

        <a href="index.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Retour à l'accueil
        </a>
      </div>
    </div>

    <script>
      // ============ CONFIGURATION EMAILJS AVEC VOS IDS ============
      const EMAILJS_CONFIG = {
        PUBLIC_KEY: "mJsSYqHg91wWDeX__",
        SERVICE_ID: "service_sb0n8dg",
        TEMPLATE_ID: "template_xv9gbfb",
      };

      // Initialiser EmailJS
      emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);

      // Récupérer les éléments du DOM
      const sendBtn = document.getElementById("sendResetBtn");
      const emailInput = document.getElementById("userEmail");
      const messageDiv = document.getElementById("message");

      // Fonction d'envoi
      async function sendResetLink() {
        const userEmail = emailInput.value.trim();

        // Validation email
        if (!userEmail) {
          messageDiv.innerHTML = "❌ Veuillez entrer votre adresse email";
          messageDiv.className = "message error";
          return;
        }

        // Validation format email
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(userEmail)) {
          messageDiv.innerHTML = "❌ Veuillez entrer une adresse email valide";
          messageDiv.className = "message error";
          return;
        }

        // Désactiver le bouton pendant l'envoi
        sendBtn.disabled = true;
        sendBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';
        messageDiv.innerHTML = "⏳ Vérification en cours...";
        messageDiv.className = "message info";

        // Générer un token unique pour ce lien (temporaire)
        // Dans un vrai système, ce token devrait être validé par un backend
        const resetToken =
          Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
        const resetLink = `https://hamabenhalima.github.io/SOIT-Infrastructure-Website/reset-password-set.html?token=${resetToken}&email=${encodeURIComponent(userEmail)}`;

        // Préparer les paramètres du template EmailJS
        const templateParams = {
          to_email: userEmail,
          user_name: "Cher client",
          reset_link: resetLink,
        };

        try {
          const response = await emailjs.send(
            EMAILJS_CONFIG.SERVICE_ID,
            EMAILJS_CONFIG.TEMPLATE_ID,
            templateParams,
          );

          if (response.status === 200) {
            messageDiv.innerHTML =
              "✅ Un lien de réinitialisation a été envoyé ! Vérifiez votre boîte email (et vos spams).";
            messageDiv.className = "message success";
            emailInput.value = "";
          } else {
            messageDiv.innerHTML =
              "❌ Erreur lors de l'envoi. Veuillez réessayer.";
            messageDiv.className = "message error";
          }
        } catch (error) {
          console.error("Erreur EmailJS:", error);
          messageDiv.innerHTML = "❌ Erreur de connexion. Veuillez réessayer.";
          messageDiv.className = "message error";
        } finally {
          // Réactiver le bouton
          sendBtn.disabled = false;
          sendBtn.innerHTML =
            '<i class="fas fa-paper-plane"></i> Envoyer le lien';
        }
      }

      // Événement au clic sur le bouton
      sendBtn.addEventListener("click", sendResetLink);

      // Permettre l'envoi avec la touche Entrée
      emailInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          sendResetLink();
        }
      });
    </script>
  </body>
</html>
