<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialisation - SOIT</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      .reset-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--light-bg);
        padding: 2rem;
      }
      .reset-box {
        background: white;
        padding: 3rem;
        border-radius: 1rem;
        max-width: 450px;
        width: 100%;
        text-align: center;
        box-shadow: var(--box-shadow);
      }
      .reset-box h2 {
        margin-bottom: 2rem;
        color: var(--black);
        font-size: 2.2rem;
      }
      .reset-box input {
        width: 100%;
        padding: 1.2rem;
        margin: 1rem 0;
        border: 1px solid #ddd;
        border-radius: 0.8rem;
        font-size: 1.5rem;
      }
      .reset-box input:focus {
        border-color: var(--bleu);
        outline: none;
      }
      .reset-box button {
        width: 100%;
        padding: 1.2rem;
        background: var(--bleu);
        color: white;
        border: none;
        border-radius: 0.8rem;
        font-size: 1.6rem;
        cursor: pointer;
        margin-top: 1rem;
        transition: all 0.3s ease;
      }
      .reset-box button:hover {
        background: var(--black);
      }
      .message {
        margin-top: 1.5rem;
        font-size: 1.4rem;
      }
      .success {
        color: #00c851;
      }
      .error {
        color: #ff4444;
      }
    </style>
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-box">
        <i
          class="fas fa-key"
          style="font-size: 5rem; color: var(--bleu); margin-bottom: 1rem"
        ></i>
        <h2>Nouveau mot de passe</h2>
        <input
          type="password"
          id="newPassword"
          placeholder="Nouveau mot de passe"
        />
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirmer le mot de passe"
        />
        <button onclick="resetPassword()">Réinitialiser</button>
        <div id="message" class="message"></div>
      </div>
    </div>

    <script>
      const API_URL = "https://soit-backend.onrender.com/api";

      async function resetPassword() {
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;
        const messageDiv = document.getElementById("message");

        if (!newPassword || !confirmPassword) {
          messageDiv.innerHTML =
            '<p class="error">❌ Veuillez remplir tous les champs</p>';
          return;
        }

        if (newPassword !== confirmPassword) {
          messageDiv.innerHTML =
            '<p class="error">❌ Les mots de passe ne correspondent pas</p>';
          return;
        }

        if (newPassword.length < 6) {
          messageDiv.innerHTML =
            '<p class="error">❌ Le mot de passe doit contenir au moins 6 caractères</p>';
          return;
        }

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");

        if (!token) {
          messageDiv.innerHTML =
            '<p class="error">❌ Lien invalide. Veuillez demander un nouveau lien.</p>';
          return;
        }

        messageDiv.innerHTML =
          '<p style="color: blue;">⏳ Envoi en cours...</p>';

        try {
          const response = await fetch(`${API_URL}/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPassword }),
          });

          const data = await response.json();

          if (data.success) {
            messageDiv.innerHTML = `<p class="success">✅ ${data.message}</p>`;
            setTimeout(() => {
              window.location.href =
                "https://hamabenhalima.github.io/SOIT-Infrastructure-Website/";
            }, 3000);
          } else {
            messageDiv.innerHTML = `<p class="error">❌ ${data.message}</p>`;
          }
        } catch (error) {
          messageDiv.innerHTML =
            '<p class="error">❌ Erreur de connexion au serveur</p>';
        }
      }
    </script>
  </body>
</html>
