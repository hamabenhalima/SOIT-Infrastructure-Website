<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialisation - SOIT</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #2370f5, #1a5cd8);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .reset-container {
        width: 100%;
        max-width: 480px;
      }

      .reset-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reset-card i {
        font-size: 60px;
        color: #2370f5;
        margin-bottom: 20px;
      }

      .reset-card h2 {
        font-size: 24px;
        color: #333;
        margin-bottom: 10px;
      }

      .reset-card p {
        font-size: 14px;
        color: #666;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #333;
      }

      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .input-group input:focus {
        outline: none;
        border-color: #2370f5;
      }

      .password-strength {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .strength-bar {
        flex: 1;
        height: 4px;
        background: #e0e0e0;
        border-radius: 2px;
        transition: all 0.3s ease;
      }

      .btn-reset {
        width: 100%;
        background: linear-gradient(135deg, #2370f5, #1a5cd8);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(35, 112, 245, 0.3);
      }

      .btn-reset:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }

      .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        display: block;
      }

      .message.error {
        background: #ffebee;
        color: #c62828;
        display: block;
      }

      .message.info {
        background: #e3f2fd;
        color: #1565c0;
        display: block;
      }

      .back-link {
        display: block;
        margin-top: 20px;
        color: #2370f5;
        text-decoration: none;
        font-size: 14px;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-card">
        <i class="fas fa-key"></i>
        <h2>Nouveau mot de passe</h2>
        <p>Veuillez choisir un mot de passe sécurisé</p>

        <div class="input-group">
          <label>📧 Email</label>
          <input
            type="email"
            id="email"
            placeholder="Votre email"
            readonly
            style="background: #f5f5f5; cursor: not-allowed"
          />
        </div>

        <div class="input-group">
          <label>🔐 Nouveau mot de passe</label>
          <input
            type="password"
            id="password"
            placeholder="Entrez votre nouveau mot de passe"
          />
          <div class="password-strength" id="password-strength">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
        </div>

        <div class="input-group">
          <label>✓ Confirmation</label>
          <input
            type="password"
            id="confirm"
            placeholder="Confirmez votre mot de passe"
          />
        </div>

        <button class="btn-reset" id="resetBtn">
          <i class="fas fa-save"></i> Réinitialiser
        </button>

        <div id="message" class="message"></div>

        <a href="index.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Retour à l'accueil
        </a>
      </div>
    </div>

    <script>
      // Configuration
      const API_URL = "https://soit-backend.onrender.com/api";

      // Récupérer le token depuis l'URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      // Vérifier si le token existe
      if (!token) {
        const msgDiv = document.getElementById("message");
        msgDiv.innerHTML =
          "❌ Lien invalide. Veuillez faire une nouvelle demande.";
        msgDiv.className = "message error";
        document.getElementById("resetBtn").disabled = true;
      }

      // Décoder le token JWT pour afficher l'email (optionnel)
      try {
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const payload = JSON.parse(atob(base64));
        if (payload.email) {
          document.getElementById("email").value = payload.email;
        }
      } catch (e) {
        console.log("Impossible de décoder le token");
      }

      // Vérification de la force du mot de passe
      const passwordInput = document.getElementById("password");
      const strengthBars = document.querySelectorAll(".strength-bar");

      function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        return Math.min(strength, 4);
      }

      passwordInput.addEventListener("input", function () {
        const strength = checkPasswordStrength(this.value);
        const colors = ["#e0e0e0", "#ff4444", "#ff9800", "#ffc107", "#4caf50"];

        strengthBars.forEach((bar, index) => {
          if (index < strength) {
            bar.style.background = colors[strength];
          } else {
            bar.style.background = "#e0e0e0";
          }
        });
      });

      // Fonction de réinitialisation
      async function resetPassword() {
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;
        const msgDiv = document.getElementById("message");
        const resetBtn = document.getElementById("resetBtn");

        // Validation mot de passe
        if (!password || !confirm) {
          msgDiv.innerHTML = "❌ Veuillez remplir tous les champs";
          msgDiv.className = "message error";
          return;
        }

        if (password !== confirm) {
          msgDiv.innerHTML = "❌ Les mots de passe ne correspondent pas";
          msgDiv.className = "message error";
          return;
        }

        if (password.length < 6) {
          msgDiv.innerHTML =
            "❌ Le mot de passe doit contenir au moins 6 caractères";
          msgDiv.className = "message error";
          return;
        }

        if (!token) {
          msgDiv.innerHTML = "❌ Token invalide. Veuillez refaire une demande.";
          msgDiv.className = "message error";
          return;
        }

        // Désactiver le bouton
        resetBtn.disabled = true;
        resetBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';
        msgDiv.innerHTML = "⏳ Vérification en cours...";
        msgDiv.className = "message info";

        try {
          // Envoyer SEULEMENT le token et le nouveau mot de passe (comme votre backend l'attend)
          const response = await fetch(`${API_URL}/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              token: token,
              newPassword: password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            msgDiv.innerHTML = `✅ ${data.message}`;
            msgDiv.className = "message success";
            resetBtn.innerHTML = '<i class="fas fa-check"></i> Réinitialisé !';

            // Rediriger vers la page d'accueil après 3 secondes
            setTimeout(() => {
              window.location.href = "index.html";
            }, 3000);
          } else {
            msgDiv.innerHTML = `❌ ${data.message}`;
            msgDiv.className = "message error";
            resetBtn.disabled = false;
            resetBtn.innerHTML = '<i class="fas fa-save"></i> Réinitialiser';
          }
        } catch (error) {
          console.error("Erreur:", error);
          msgDiv.innerHTML =
            "❌ Erreur de connexion au serveur. Veuillez réessayer.";
          msgDiv.className = "message error";
          resetBtn.disabled = false;
          resetBtn.innerHTML = '<i class="fas fa-save"></i> Réinitialiser';
        }
      }

      // Bouton de réinitialisation
      document
        .getElementById("resetBtn")
        .addEventListener("click", resetPassword);

      // Permettre l'envoi avec Entrée
      document.querySelectorAll("input").forEach((input) => {
        input.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            resetPassword();
          }
        });
      });
    </script>
  </body>
</html>
