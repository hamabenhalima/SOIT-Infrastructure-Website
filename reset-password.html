<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialisation - SOIT</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #2370f5, #1a5cd8);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .reset-container {
        width: 100%;
        max-width: 480px;
      }

      .reset-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reset-card i {
        font-size: 60px;
        color: #2370f5;
        margin-bottom: 20px;
      }

      .reset-card h2 {
        font-size: 24px;
        color: #333;
        margin-bottom: 10px;
      }

      .reset-card p {
        font-size: 14px;
        color: #666;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #333;
      }

      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .input-group input:focus {
        outline: none;
        border-color: #2370f5;
      }

      .password-strength {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .strength-bar {
        flex: 1;
        height: 4px;
        background: #e0e0e0;
        border-radius: 2px;
        transition: all 0.3s ease;
      }

      .btn-reset {
        width: 100%;
        background: linear-gradient(135deg, #2370f5, #1a5cd8);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(35, 112, 245, 0.3);
      }

      .btn-reset:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }

      .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        display: block;
      }

      .message.error {
        background: #ffebee;
        color: #c62828;
        display: block;
      }

      .message.info {
        background: #e3f2fd;
        color: #1565c0;
        display: block;
      }

      .back-link {
        display: block;
        margin-top: 20px;
        color: #2370f5;
        text-decoration: none;
        font-size: 14px;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      /* Masquer les formulaires selon la situation */
      .form-request,
      .form-reset {
        display: none;
      }
      .active-form {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-card">
        <i class="fas fa-key" id="icon"></i>
        <h2 id="title">Réinitialisation</h2>
        <p id="description">Entrez votre email pour recevoir un lien</p>

        <!-- Formulaire de demande d'email -->
        <div id="form-request" class="form-request">
          <div class="input-group">
            <label>📧 Votre adresse email</label>
            <input
              type="email"
              id="request-email"
              placeholder="exemple@email.com"
            />
          </div>
          <button class="btn-reset" id="sendRequestBtn">
            <i class="fas fa-paper-plane"></i> Envoyer le lien
          </button>
        </div>

        <!-- Formulaire de nouveau mot de passe -->
        <div id="form-reset" class="form-reset">
          <div class="input-group">
            <label>🔐 Nouveau mot de passe</label>
            <input
              type="password"
              id="new-password"
              placeholder="Minimum 6 caractères"
            />
            <div class="password-strength" id="password-strength">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
          </div>
          <div class="input-group">
            <label>✓ Confirmation</label>
            <input
              type="password"
              id="confirm-password"
              placeholder="Retapez le mot de passe"
            />
          </div>
          <button class="btn-reset" id="resetPasswordBtn">
            <i class="fas fa-save"></i> Réinitialiser
          </button>
        </div>

        <div id="message" class="message"></div>

        <a href="index.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Retour à l'accueil
        </a>
      </div>
    </div>

    <script>
      // Configuration
      const API_URL = "https://soit-backend.onrender.com/api";

      // Éléments DOM
      const requestForm = document.getElementById("form-request");
      const resetForm = document.getElementById("form-reset");
      const title = document.getElementById("title");
      const description = document.getElementById("description");
      const icon = document.getElementById("icon");

      // Récupérer le token dans l'URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      // Afficher le bon formulaire selon la présence du token
      if (token) {
        // Mode réinitialisation (saisie du nouveau mot de passe)
        requestForm.classList.remove("active-form");
        resetForm.classList.add("active-form");
        title.innerText = "Nouveau mot de passe";
        description.innerText = "Veuillez choisir un mot de passe sécurisé";
        icon.className = "fas fa-lock";

        // Initialiser la force du mot de passe
        initPasswordStrength();

        // Écouter le clic sur le bouton de réinitialisation
        document
          .getElementById("resetPasswordBtn")
          .addEventListener("click", resetPassword);
      } else {
        // Mode demande d'email
        requestForm.classList.add("active-form");
        resetForm.classList.remove("active-form");
        title.innerText = "Réinitialisation";
        description.innerText = "Entrez votre email pour recevoir un lien";
        icon.className = "fas fa-key";

        // Écouter le clic sur le bouton de demande
        document
          .getElementById("sendRequestBtn")
          .addEventListener("click", sendResetRequest);
      }

      // Fonction pour la demande d'email
      async function sendResetRequest() {
        const email = document.getElementById("request-email").value.trim();
        const messageDiv = document.getElementById("message");
        const btn = document.getElementById("sendRequestBtn");

        if (!email) {
          messageDiv.innerHTML = "❌ Veuillez entrer votre email";
          messageDiv.className = "message error";
          return;
        }

        // Validation simple
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          messageDiv.innerHTML = "❌ Email invalide";
          messageDiv.className = "message error";
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
        messageDiv.innerHTML = "⏳ Envoi en cours...";
        messageDiv.className = "message info";

        try {
          const response = await fetch(`${API_URL}/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();

          if (data.success) {
            messageDiv.innerHTML = `✅ ${data.message}`;
            messageDiv.className = "message success";
            document.getElementById("request-email").value = "";
          } else {
            messageDiv.innerHTML = `❌ ${data.message}`;
            messageDiv.className = "message error";
          }
        } catch (error) {
          console.error(error);
          messageDiv.innerHTML = "❌ Erreur de connexion. Veuillez réessayer.";
          messageDiv.className = "message error";
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer le lien';
        }
      }

      // Fonction pour la réinitialisation du mot de passe
      async function resetPassword() {
        const newPassword = document.getElementById("new-password").value;
        const confirm = document.getElementById("confirm-password").value;
        const messageDiv = document.getElementById("message");
        const btn = document.getElementById("resetPasswordBtn");

        if (!newPassword || !confirm) {
          messageDiv.innerHTML = "❌ Veuillez remplir tous les champs";
          messageDiv.className = "message error";
          return;
        }

        if (newPassword.length < 6) {
          messageDiv.innerHTML =
            "❌ Le mot de passe doit contenir au moins 6 caractères";
          messageDiv.className = "message error";
          return;
        }

        if (newPassword !== confirm) {
          messageDiv.innerHTML = "❌ Les mots de passe ne correspondent pas";
          messageDiv.className = "message error";
          return;
        }

        btn.disabled = true;
        btn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Réinitialisation...';
        messageDiv.innerHTML = "⏳ Mise à jour...";
        messageDiv.className = "message info";

        try {
          const response = await fetch(`${API_URL}/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPassword }),
          });
          const data = await response.json();

          if (data.success) {
            messageDiv.innerHTML = `✅ ${data.message}`;
            messageDiv.className = "message success";
            setTimeout(() => {
              window.location.href = "index.html";
            }, 3000);
          } else {
            messageDiv.innerHTML = `❌ ${data.message}`;
            messageDiv.className = "message error";
          }
        } catch (error) {
          console.error(error);
          messageDiv.innerHTML = "❌ Erreur de connexion. Veuillez réessayer.";
          messageDiv.className = "message error";
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-save"></i> Réinitialiser';
        }
      }

      // Indicateur de force du mot de passe
      function initPasswordStrength() {
        const passwordInput = document.getElementById("new-password");
        const strengthBars = document.querySelectorAll(".strength-bar");

        function checkStrength(password) {
          let strength = 0;
          if (password.length >= 6) strength++;
          if (password.length >= 10) strength++;
          if (/[A-Z]/.test(password)) strength++;
          if (/[0-9]/.test(password)) strength++;
          if (/[^A-Za-z0-9]/.test(password)) strength++;
          return Math.min(strength, 4);
        }

        passwordInput.addEventListener("input", function () {
          const strength = checkStrength(this.value);
          const colors = [
            "#e0e0e0",
            "#ff4444",
            "#ff9800",
            "#ffc107",
            "#4caf50",
          ];
          strengthBars.forEach((bar, index) => {
            bar.style.background =
              index < strength ? colors[strength] : "#e0e0e0";
          });
        });
      }
    </script>
  </body>
</html>
